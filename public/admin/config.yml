              - { name: "namePlaceholder", label: "Placeholder nume", widget: "string" }
              - { name: "phoneLabel", label: "Etichetă telefon", widget: "string" }
              - { name: "phonePlaceholder", label: "Placeholder telefon", widget: "string" }
