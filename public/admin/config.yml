              - { name: "eyebrow", label: "Supratitlu", widget: "string" }
              - { name: "title", label: "Titlu", widget: "string" }
              - { name: "lede", label: "Intro", widget: "text" }
          - label: "Pași"
            name: "steps"
            widget: "list"
            fields:
              - { name: "num", label: "Număr", widget: "string" }
              - { name: "kicker", label: "Etichetă", widget: "string" }
              - { name: "title", label: "Titlu", widget: "string" }
              - { name: "text", label: "Text", widget: "text" }
          - label: "În culise"
            name: "behind"
            widget: "object"
            fields:
              - { name: "eyebrow", label: "Supratitlu", widget: "string" }
              - { name: "heading", label: "Titlu", widget: "string" }
              - { name: "sub", label: "Subtitlu", widget: "text" }
              - { name: "items", label: "Pași listă (acceptă HTML)", widget: "list", field: { name: "item", label: "Element", widget: "text" } }
