          - label: "Albine, viespi sau altceva?"
            name: "confusion"
            widget: "object"
            fields:
              - { name: "heading", label: "Titlu", widget: "string" }
              - { name: "text", label: "Text (permite HTML)", widget: "text" }
              - label: "Casetă"
                name: "callout"
                widget: "object"
                fields:
                  - { name: "title", label: "Titlu casetă", widget: "string" }
