                fields:
                  - { name: "heading", label: "Titlu", widget: "string" }
                  - { name: "items", label: "Listă", widget: "list", field: { name: "item", label: "Element", widget: "string" } }
                  - { name: "summary", label: "Concluzie", widget: "text" }
              - name: "callout"
                label: "Casetă evidențiată"
                widget: "object"
                fields:
                  - { name: "title", label: "Titlu", widget: "string" }
                  - { name: "text", label: "Text", widget: "text" }
              - name: "people"
                label: "Oamenii"
                widget: "object"
                fields:
                  - { name: "heading", label: "Titlu", widget: "string" }
                  - { name: "text", label: "Text", widget: "text" }
              - name: "collaboration"
                label: "Colaborare"
                widget: "object"
                fields:
                  - { name: "heading", label: "Titlu", widget: "string" }
                  - { name: "text", label: "Text", widget: "text" }
          - name: "summaryCard"
