            widget: "object"
            fields:
              - { name: "title", label: "Titlu", widget: "string" }
              - { name: "text", label: "Text (acceptă HTML)", widget: "text" }
          - label: "Card date contact"
            name: "contactCard"
            widget: "object"
            fields:
              - { name: "title", label: "Titlu card", widget: "string" }
              - label: "Rânduri"
                name: "rows"
                widget: "list"
                fields:
                  - { name: "label", label: "Etichetă", widget: "string" }
                  - { name: "value", label: "Valoare", widget: "string" }
                  - { name: "href", label: "Link (opțional)", widget: "string", required: false }
          - label: "Buton Facebook"
            name: "facebook"
            widget: "object"
            fields:
              - { name: "href", label: "URL", widget: "string" }
              - { name: "label", label: "Etichetă", widget: "string" }

  # ═════════════════════════════════════════════════════════════
  # 3) JURNAL — arhiva de intervenții (content collection Astro).
  # ═════════════════════════════════════════════════════════════
  - name: "jurnal"
    label: "Jurnal — Intervenții"
    label_singular: "Articol"
    folder: "src/content/jurnal"
    extension: "md"
    format: "frontmatter"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{data}} — {{title}}"
    sortable_fields: ["data", "title"]
    fields:
      - { name: "title", label: "Titlu", widget: "string" }
      - { name: "locatie", label: "Locație", widget: "string", hint: "ex: Rădulești, lângă Videle" }
      - { name: "data", label: "Dată", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD", picker_utc: true }
      - { name: "eticheta", label: "Etichetă (SEO / tip)", widget: "string", required: false }
      - { name: "rezumat", label: "Rezumat (card + lede)", widget: "text" }
      - { name: "fotoHero", label: "Foto principală (hero)", widget: "image" }
      - { name: "fotoHeroAlt", label: "Text alternativ foto principală (ALT)", widget: "string", required: false, hint: "descriere scurtă a imaginii — pentru accesibilitate și SEO" }
      - { name: "fotoHeroCaption", label: "Legendă foto principală", widget: "string", required: false }
      - { name: "featured", label: "Afișează mare (featured)", widget: "boolean", default: false }
      - { name: "body", label: "Conținut articol", widget: "markdown" }
      - name: "galerie"
        label: "Galerie"
        widget: "list"
        required: false
        summary: "{{fields.imagine}}"
        fields:
          - { name: "imagine", label: "Imagine", widget: "image" }
          - { name: "legenda", label: "Legendă", widget: "string", required: false }
