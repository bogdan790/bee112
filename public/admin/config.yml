# Decap CMS — config.yml
# În Astro, servește acest fișier ca static la /admin/config.yml  →  public/admin/config.yml
# Accesibil la: https://bee112.ro/admin/
#
# Backend GitHub (pentru Cloudflare Pages — NU git-gateway). Necesită GitHub OAuth App + proxy
# OAuth (Cloudflare Worker). Vezi INSTRUCTIUNI_DECAP_CMS.md §3.
#
# FILOZOFIE: tot ce e editabil trăiește ca fișiere în repo (JSON pentru date globale + pagini,
# Markdown pentru articole). Fiecare .astro CITEȘTE aceste fișiere. CMS-ul doar le editează.

backend:
  name: github
  repo: bogdan790/bee112
  branch: main
  base_url: https://bee112-cms-oauth.pavel-bogdann.workers.dev
  auth_endpoint: /auth

# Test local fără GitHub/commit: rulează `npx decap-server` + `npm run dev`,
# apoi deschide http://localhost:4321/admin/ (scrie direct în fișierele locale).
# Pe bee112.ro este ignorat automat — acolo se folosește backend-ul github de mai sus.
local_backend: true

# Publicare directă: când salvezi, modificarea ajunge direct pe site (după rebuild).
# (Pentru flux cu ciorne + aprobare, adaugă înapoi: publish_mode: editorial_workflow)

media_folder: "public/images"        # toate pozele
public_folder: "/images"

locale: "ro"

collections:
  # ═════════════════════════════════════════════════════════════
  # 1) SETĂRI GLOBALE — meniu, footer, date de contact, butoane.
  #    "files" = fișiere unice (singletons), nu liste.
  # ═════════════════════════════════════════════════════════════
  - name: "setari"
    label: "Setări site"
    files:
      - name: "site"
        label: "Date generale & butoane"
        file: "src/data/site.json"
        fields:
          - { name: "brandName", label: "Nume brand", widget: "string", default: "BEE112" }
          - { name: "phone", label: "Telefon (afișat)", widget: "string", default: "0761 330 577" }
          - { name: "phoneTel", label: "Telefon (link tel:)", widget: "string", default: "+40761330577" }
          - { name: "email", label: "Email", widget: "string", default: "contact@bee112.ro" }
          - { name: "coverage", label: "Acoperire", widget: "string", default: "București & Ilfov" }
          - { name: "phoneBtnLabel", label: "Etichetă buton telefon", widget: "string", default: "Sună acum" }
          - { name: "stickyCtaLabel", label: "Buton mobil (sticky)", widget: "string", default: "Sună BEE112" }
          - { name: "secondaryCtaLabel", label: "Buton secundar (hero)", widget: "string", default: "Cum funcționează →" }
          - { name: "secondaryCtaHref", label: "Link buton secundar", widget: "string", default: "/cum-functioneaza" }

      - name: "nav"
        label: "Meniu (navigare)"
        file: "src/data/nav.json"
        fields:
          - name: "links"
            label: "Linkuri meniu"
            widget: "list"
            label_singular: "Link"
            summary: "{{fields.label}}"
            fields:
              - { name: "label", label: "Text", widget: "string" }
              - { name: "href", label: "Adresă (URL)", widget: "string", hint: "ex: /jurnal" }

      - name: "footer"
        label: "Footer"
        file: "src/data/footer.json"
        fields:
          - { name: "tagline", label: "Descriere scurtă", widget: "text" }
          - { name: "bottomLeft", label: "Text jos-stânga", widget: "string", required: false }
          - { name: "bottomRight", label: "Text jos-dreapta (copyright)", widget: "string", required: false }
          - name: "columns"
            label: "Coloane footer"
            widget: "list"
            label_singular: "Coloană"
            summary: "{{fields.title}}"
            fields:
              - { name: "title", label: "Titlu coloană", widget: "string" }
              - name: "links"
                label: "Linkuri"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { name: "label", label: "Text", widget: "string" }
                  - { name: "href", label: "Adresă", widget: "string", required: false, hint: "lasă gol pentru text simplu, fără link" }

  # ═════════════════════════════════════════════════════════════
  # 2) PAGINI — conținutul fiecărei pagini ca date structurate.
  #    Fiecare .astro citește JSON-ul corespunzător din src/data/pages/.
  #    Mai jos: HOME (exemplu complet). Replică același tipar pentru
  #    celelalte pagini (cine-suntem, cum-functioneaza, etc.).
  # ═════════════════════════════════════════════════════════════
  - name: "pagini"
    label: "Pagini"
    files:
      - name: "home"
        label: "Acasă"
        file: "src/data/pages/home.json"
        fields:
          - { name: "seoTitle", label: "Titlu SEO", widget: "string" }
          - { name: "seoDescription", label: "Descriere SEO", widget: "text" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { name: "eyebrow", label: "Supratitlu", widget: "string" }
              - { name: "title", label: "Titlu (HTML permis: <span>, <br>)", widget: "text" }
              - { name: "lede", label: "Subtitlu", widget: "text" }
              - name: "meta"
                label: "Etichete (sub butoane)"
                widget: "list"
                summary: "{{fields.strong}}{{fields.rest}}"
                fields:
                  - { name: "strong", label: "Accent (bold)", widget: "string" }
                  - { name: "rest", label: "Rest text", widget: "string" }
          - label: "Card „Despre intervenție”"
            name: "infoCard"
            widget: "object"
            fields:
              - { name: "title", label: "Titlu card", widget: "string", default: "Despre intervenție" }
              - name: "rows"
                label: "Rânduri"
                widget: "list"
                summary: "{{fields.label}}: {{fields.value}}"
                fields:
                  - { name: "label", label: "Etichetă", widget: "string" }
                  - { name: "value", label: "Valoare", widget: "string" }
              - { name: "live", label: "Text bandă „live”", widget: "string" }
          - label: "Secțiuni"
            name: "sections"
            widget: "list"
            typeKey: "kind"
            summary: "{{fields.heading}}"
            types:
              - label: "Proces (pași)"
                name: "process"
                widget: "object"
                fields:
                  - { name: "eyebrow", label: "Supratitlu", widget: "string" }
                  - { name: "heading", label: "Titlu", widget: "string" }
                  - { name: "sub", label: "Subtitlu", widget: "text" }
                  - name: "steps"
                    label: "Pași"
                    widget: "list"
                    summary: "{{fields.title}}"
                    fields:
                      - { name: "num", label: "Număr", widget: "string" }
                      - { name: "kicker", label: "Etichetă", widget: "string" }
                      - { name: "title", label: "Titlu", widget: "string" }
                      - { name: "text", label: "Text", widget: "text" }
              - label: "Autorități (carduri)"
                name: "authorities"
                widget: "object"
                fields:
                  - { name: "eyebrow", label: "Supratitlu", widget: "string" }
                  - { name: "heading", label: "Titlu", widget: "string" }
                  - { name: "sub", label: "Subtitlu", widget: "text" }
                  - name: "cards"
                    label: "Carduri"
                    widget: "list"
                    summary: "{{fields.title}}"
                    fields:
                      - { name: "badge", label: "Etichetă", widget: "string" }
                      - { name: "title", label: "Titlu", widget: "string" }
                      - { name: "text", label: "Text", widget: "text" }
              - label: "Ce să NU faci"
                name: "avoid"
                widget: "object"
                fields:
                  - { name: "eyebrow", label: "Supratitlu", widget: "string" }
                  - { name: "heading", label: "Titlu", widget: "string" }
                  - { name: "sub", label: "Subtitlu", widget: "text" }
                  - name: "items"
                    label: "Elemente"
                    widget: "list"
                    summary: "{{fields.title}}"
                    fields:
                      - { name: "title", label: "Titlu", widget: "string" }
                      - { name: "text", label: "Text", widget: "text" }
                  - { name: "ctaLabel", label: "Etichetă buton", widget: "string" }
                  - { name: "ctaHref", label: "Link buton", widget: "string" }
              - label: "Reasigurare"
                name: "reassure"
                widget: "object"
                fields:
                  - { name: "heading", label: "Titlu", widget: "string" }
                  - { name: "text", label: "Text", widget: "text" }
      - name: "cine-suntem"
        label: "Cine suntem"
        file: "src/data/pages/cine-suntem.json"
        fields:
          - { name: "seoTitle", label: "Titlu SEO", widget: "string" }
          - { name: "seoDescription", label: "Descriere SEO", widget: "text" }
          - name: "pageHead"
