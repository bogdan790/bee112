              - { name: "paragraphs", label: "Paragrafe (acceptă HTML)", widget: "list", field: { name: "paragraph", label: "Paragraf", widget: "text" } }
      - name: "importanta-albinelor"
        label: "Importanța albinelor"
        file: "src/data/pages/importanta-albinelor.json"
        fields:
          - { name: "seoTitle", label: "Titlu SEO", widget: "string" }
          - { name: "seoDescription", label: "Descriere SEO", widget: "text" }
          - label: "Antet pagină"
            name: "head"
            widget: "object"
            fields:
              - { name: "eyebrow", label: "Etichetă", widget: "string" }
              - { name: "h1", label: "Titlu H1", widget: "string" }
              - { name: "lede", label: "Intro", widget: "text" }
          - label: "Statistici"
            name: "stats"
            widget: "list"
            fields:
              - { name: "num", label: "Cifră", widget: "string" }
              - { name: "lbl", label: "Etichetă", widget: "text" }
          - label: "Albinele nu sunt agresive"
            name: "notAggressive"
            widget: "object"
            fields:
              - { name: "heading", label: "Titlu", widget: "string" }
              - { name: "intro", label: "Intro (permite HTML)", widget: "text" }
              - { name: "list", label: "Listă", widget: "list", field: { name: "item", label: "Element", widget: "string" } }
