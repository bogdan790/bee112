<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <title>BEE112 — Preview Desktop / Mobil</title>
  <style>
    :root { --bg: #f4f1ea; --ink: #1f2418; --primary: #5a8a3a; }
    html, body { margin: 0; height: 100%; background: var(--bg); font-family: ui-sans-serif, system-ui, sans-serif; color: var(--ink); }
    body { display: flex; flex-direction: column; }
    .bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: #fff; border-bottom: 1px solid #e6e1d5;
      box-shadow: 0 1px 0 rgba(0,0,0,.02); flex-shrink: 0; z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
    .brand-mark { width: 26px; height: 26px; border-radius: 6px; background: var(--primary); color: #fff;
      display: grid; place-items: center; font-family: ui-monospace, monospace; font-size: 12px; font-weight: 700; }
    .toggle {
      display: inline-flex; padding: 4px; background: #f1ede4; border-radius: 999px; gap: 2px;
    }
    .toggle button {
      appearance: none; border: 0; background: transparent; cursor: pointer;
      padding: 8px 16px; font: inherit; font-size: 13px; font-weight: 500;
      color: #6b6b6b; border-radius: 999px; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .toggle button.active { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .toggle button:hover:not(.active) { color: var(--ink); }
    .toggle svg { width: 14px; height: 14px; }
    .hint { font-size: 12px; color: #8a8a8a; font-family: ui-monospace, monospace; }

    .stage { flex: 1; min-height: 0; position: relative; overflow: auto; display: flex; align-items: flex-start; justify-content: center; padding: 24px; background: #1a1a1a; }
    .stage.desktop { background: var(--bg); padding: 0; }
    .stage.desktop iframe { width: 100%; height: 100%; border: 0; }

    .stage.mobile { background: #1a1a1a; }
    .device {
      width: 390px; flex-shrink: 0;
      background: #000; border-radius: 42px; border: 10px solid #111; overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.5); position: relative;
      margin: 24px 0;
    }
    .device::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 120px; height: 28px; background: #111; border-radius: 0 0 18px 18px; z-index: 2;
    }
    .device iframe { width: 390px; height: 824px; border: 0; display: block; background: var(--bg); }
  </style>
</head>
<body style="background-color: rgb(255, 255, 255)">
  <div class="bar">
    <div class="brand">
      <span class="brand-mark">B</span>
      <span>BEE112 · preview</span>
    </div>
    <div class="toggle" role="tablist">
      <button id="t-desktop" class="active" onclick="setMode('desktop')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Desktop
      </button>
      <button id="t-mobile" onclick="setMode('mobile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><path d="M12 18h.01"/></svg>
        Mobil
      </button>
    </div>
    <span class="hint" id="hint">1440 × 100%</span>
  </div>

  <div class="stage desktop" id="stage">
    <iframe id="frame" src="index.html"></iframe>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const hint = document.getElementById('hint');
    const tD = document.getElementById('t-desktop');
    const tM = document.getElementById('t-mobile');

    function setMode(mode) {
      const cur = document.getElementById('frame').src;
      stage.className = 'stage ' + mode;
      tD.classList.toggle('active', mode === 'desktop');
      tM.classList.toggle('active', mode === 'mobile');
      if (mode === 'desktop') {
        stage.innerHTML = '<iframe id="frame" src="' + cur.replace(/[#?].*$/, '') + '"></iframe>';
        hint.textContent = '100% · responsive';
      } else {
        stage.innerHTML = '<div class="device"><iframe id="frame" src="' + cur.replace(/[#?].*$/, '') + '"></iframe></div>';
        hint.textContent = '390 × 844 · iPhone 14';
      }
    }
  </script>
</body>
</html>
